  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{
      --bg:#faf7f5;--white:#fff;--surface:#f3efed;
      --border:#e8e0dc;--border2:#d5ccc7;
      --text:#2c2420;--text2:#7a6e66;--text3:#b0a49c;
      --accent:#e85d75;--accent-light:#fce8ec;--accent-dark:#d14a62;
      --radius:12px;--radius-lg:16px;
      --shadow:0 1px 8px rgba(44,36,32,0.06);
      --shadow-lg:0 4px 24px rgba(44,36,32,0.1);
    }
    body{
      font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","PingFang TC","Noto Sans JP","Noto Sans KR","Microsoft JhengHei","Noto Sans TC",sans-serif;
      background:var(--bg);color:var(--text);min-height:100vh;
      -webkit-font-smoothing:antialiased;
    }
    .container{
      max-width:640px;margin:0 auto;padding:20px 16px 40px;
      display:flex;flex-direction:column;align-items:center;
    }

    /* Top bar */
    .top-bar{
      display:flex;align-items:center;justify-content:center;gap:12px;
      flex-wrap:wrap;margin-bottom:20px;width:100%;
    }
    .powered-by{
      display:inline-flex;align-items:center;gap:6px;
      padding:6px 14px;border:1px solid var(--border);border-radius:20px;
      background:var(--white);font-size:0.78rem;color:var(--text3);
      box-shadow:var(--shadow);text-decoration:none;transition:all 0.2s;
    }
    .powered-by:hover{border-color:var(--accent);color:var(--text2)}
    .powered-by b{color:var(--accent);font-weight:700}
    .lang-switcher{
      display:inline-flex;background:var(--surface);border-radius:8px;
      padding:2px;gap:1px;
    }
    .lang-btn{
      padding:4px 10px;border-radius:6px;border:none;
      background:none;font-size:0.75rem;color:var(--text3);
      cursor:pointer;transition:all 0.2s;
    }
    .lang-btn.active{background:var(--white);color:var(--text);box-shadow:var(--shadow)}

    /* Header */
    .header{text-align:center;margin-bottom:8px}
    .header h1{font-size:1.5rem;font-weight:800;color:var(--text);margin-bottom:4px}
    .header .subtitle{font-size:0.85rem;color:var(--text2)}
    .back-link{
      font-size:0.82rem;color:var(--accent);text-decoration:none;
      margin-bottom:16px;opacity:0.8;transition:opacity 0.2s;
    }
    .back-link:hover{opacity:1;text-decoration:underline}

    /* Kind tabs */
    .kind-tabs{
      display:flex;gap:6px;justify-content:center;
      margin:16px 0 20px;flex-wrap:wrap;
    }
    .kind-tab{
      padding:8px 16px;border-radius:20px;border:1px solid var(--border);
      background:var(--white);font-size:0.82rem;color:var(--text2);
      cursor:pointer;transition:all 0.2s;
    }
    .kind-tab:hover{border-color:var(--accent);color:var(--accent)}
    .kind-tab.active{
      background:var(--accent);color:var(--white);border-color:var(--accent);
    }

    /* Ranking list */
    .ranking-list{width:100%;margin-top:8px}
    .rank-item{
      display:flex;align-items:center;gap:12px;
      padding:12px 16px;background:var(--white);
      border-radius:var(--radius);margin-bottom:8px;
      box-shadow:var(--shadow);transition:transform 0.15s;
    }
    .rank-item:hover{transform:translateX(4px)}
    .rank-num{
      font-size:1.1rem;font-weight:800;color:var(--text3);
      min-width:28px;text-align:center;
    }
    .rank-num.top-1{color:#FFD700;font-size:1.3rem}
    .rank-num.top-2{color:#C0C0C0;font-size:1.2rem}
    .rank-num.top-3{color:#CD7F32;font-size:1.15rem}
    .rank-cover{
      width:48px;height:64px;border-radius:8px;
      background:var(--surface);flex-shrink:0;
      overflow:hidden;position:relative;
    }
    .rank-cover img{
      width:100%;height:100%;object-fit:cover;
      display:block;
    }
    .rank-cover-init{
      width:100%;height:100%;display:flex;align-items:center;justify-content:center;
      font-size:1.1rem;font-weight:700;color:var(--white);
    }
    .rank-info{flex:1;min-width:0}
    .rank-title{
      font-size:0.9rem;font-weight:600;color:var(--text);
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    }
    .rank-bar-wrap{
      margin-top:6px;height:6px;background:var(--surface);
      border-radius:3px;overflow:hidden;
    }
    .rank-bar{
      height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-dark));
      border-radius:3px;transition:width 0.6s ease-out;
    }
    .rank-count{
      font-size:0.72rem;color:var(--text3);margin-top:3px;
    }

    /* Empty state */
    .empty-state{
      text-align:center;padding:60px 20px;color:var(--text3);
    }
    .empty-state .emoji{font-size:3rem;margin-bottom:12px}
    .empty-state p{font-size:0.9rem;margin-bottom:16px}

    /* CTA */
    .cta-bottom{
      margin-top:32px;text-align:center;width:100%;
    }
    .btn-make{
      display:inline-block;padding:14px 32px;
      background:var(--accent);color:var(--white);
      border:none;border-radius:var(--radius-lg);
      font-size:1rem;font-weight:700;cursor:pointer;
      text-decoration:none;box-shadow:var(--shadow-lg);
      transition:all 0.2s;
    }
    .btn-make:hover{background:var(--accent-dark);transform:translateY(-1px)}

    /* Fade in */
    .fade-in{opacity:0;transform:translateY(12px);animation:fadeIn 0.5s ease forwards}
    .fade-in-1{animation-delay:0.1s}
    .fade-in-2{animation-delay:0.2s}
    .fade-in-3{animation-delay:0.3s}
    @keyframes fadeIn{to{opacity:1;transform:translateY(0)}}
  </style>
</head>

        { title: 'supercell', count: 132 },
        { title: '椎名林檎', count: 121 },
        { title: 'ClariS', count: 115 },
      ],
    };

    // ===== API CONFIG (must match index.html) =====
    const API_BASE = null; // e.g., 'https://pixai.art/api/my9'
    let backendAvailable = false;
    let backendTrending = {}; // { game: [...], anime: [...], ... }

    // Cover cache
    const coverCache = JSON.parse(localStorage.getItem('my9_cover_cache') || '{}');

    // ===== LANG =====
    function detectLang() {
      const urlLang = new URLSearchParams(location.search).get('lang');
      if (urlLang && I18N[urlLang]) return urlLang;
      const saved = localStorage.getItem('my9_lang');
      if (saved && I18N[saved]) return saved;
      const langs = navigator.languages || [navigator.language || 'en'];
      for (const l of langs) {
        if (l.startsWith('ja')) return 'ja';
        if (l.startsWith('ko')) return 'ko';
        if (l === 'zh-TW' || l === 'zh-Hant' || l.startsWith('zh-Hant')) return 'zh-TW';
      }
      return 'en';
    }

    let currentLang = detectLang();
    let currentKind = new URLSearchParams(location.search).get('kind') || 'game';

    function t(key, params) {
      let s = (I18N[currentLang] && I18N[currentLang][key]) || I18N.en[key] || key;
      if (params) Object.keys(params).forEach(k => {
        s = s.replace(new RegExp('\\{' + k + '\\}', 'g'), params[k]);
      });
      return s;
    }

    // ===== LANG SWITCHER =====
    const LANG_LABELS = { ja: '日本語', ko: '한국어', en: 'EN', 'zh-TW': '繁中' };
    function renderLangSwitcher() {
      const el = document.getElementById('langSwitcher');
      el.innerHTML = Object.keys(LANG_LABELS).map(lang =>
        `<button class="lang-btn${lang===currentLang?' active':''}" data-lang="${lang}">${LANG_LABELS[lang]}</button>`
      ).join('');
      el.querySelectorAll('.lang-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          currentLang = btn.dataset.lang;
          localStorage.setItem('my9_lang', currentLang);
          render();
        });
      });
    }

    // ===== KIND TABS =====
    function renderKindTabs() {
      const kinds = ['game', 'anime', 'manga', 'music'];
      document.getElementById('kindTabs').innerHTML = kinds.map(k =>
        `<button class="kind-tab${k===currentKind?' active':''}" data-kind="${k}">${t('tab_'+k)}</button>`
      ).join('');
      document.querySelectorAll('.kind-tab').forEach(btn => {
        btn.addEventListener('click', () => {
          currentKind = btn.dataset.kind;
          render();
          // If backend is available but we haven't fetched this kind yet, fetch it
          if (API_BASE && !backendTrending[currentKind]) {
            loadFromBackend();
          }
        });
      });
    }

    // ===== DATA MERGE =====
    function getRankData() {
      // If backend data is available for this kind, use it directly
      if (backendAvailable && backendTrending[currentKind]) {
        return backendTrending[currentKind].map(item => ({
          ...item,
          cover: item.cover || coverCache[item.id] || ''
        }));
      }

      // Fallback: seed data + localStorage
      const merged = {};
      (SEED[currentKind] || []).forEach(item => {
        const key = item.id ? String(item.id) : item.title;
        merged[key] = { ...item, cover: item.cover || coverCache[item.id] || '' };
      });

      // Merge localStorage picks (from user's card generations)
      try {
        const picks = JSON.parse(localStorage.getItem('my9_picks') || '{}');
        const kindPicks = picks[currentKind] || {};
        Object.entries(kindPicks).forEach(([id, p]) => {
          if (merged[id]) {
            merged[id].count += p.count;
            if (p.cover) merged[id].cover = p.cover;
          } else if (merged[p.title]) {
            merged[p.title].count += p.count;
            if (p.cover) merged[p.title].cover = p.cover;
          } else {
            merged[id] = { id: Number(id), title: p.title, cover: p.cover || '', count: p.count };
          }
        });
      } catch(e) {}

      // Date-based growth multiplier
      const baseDate = new Date('2026-03-01T00:00:00').getTime();
      const days = Math.max(0, Math.floor((Date.now() - baseDate) / 86400000));
      const growth = 1 + days * 0.008;

      return Object.values(merged)
        .map(item => ({ ...item, count: Math.round(item.count * growth) }))
        .sort((a, b) => b.count - a.count)
        .slice(0, 20);
    }

    // ===== COVER COLORS =====
    const PALETTE = ['#e85d75','#5d8ce8','#5dcde8','#e8a85d','#8b5de8','#5de88b','#e85da8','#5d75e8','#e85d5d','#5de8d4'];
    function colorFor(title) { return PALETTE[Math.abs(hashStr(title)) % PALETTE.length]; }
    function hashStr(s) { let h=0; for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0;} return h; }

    // ===== LAZY COVER FETCH =====
    const proxyUrl = url => `https://wsrv.nl/?url=${encodeURIComponent(url)}`;

    async function fetchCovers(data) {
      const toFetch = data.filter(item => item.id && !item.cover);
      if (!toFetch.length) return;

      // Fetch in batches of 5
      for (let i = 0; i < toFetch.length; i += 5) {
        const batch = toFetch.slice(i, i + 5);
        const results = await Promise.all(batch.map(item =>
          fetch(`https://api.bgm.tv/subject/${item.id}?responseGroup=small`)
            .then(r => r.ok ? r.json() : null).catch(() => null)
        ));
        results.forEach((res, idx) => {
          if (res && res.images && res.images.common) {
            const rawCover = (res.images.common || '').replace('http://', 'https://');
            const cover = proxyUrl(rawCover);
            const id = batch[idx].id;
            coverCache[id] = cover;
            // Update DOM in-place
            const container = document.querySelector(`[data-bgm-id="${id}"] .rank-cover`);
            if (!container) return;
            let img = container.querySelector('img');
            if (!img) {
              img = document.createElement('img');
              img.loading = 'lazy';
              img.alt = '';
              img.style.display = 'block';
              const init = container.querySelector('.rank-cover-init');
              img.onerror = () => { img.style.display = 'none'; if (init) init.style.display = 'flex'; };
              container.insertBefore(img, container.firstChild);
            }
            img.src = cover;
            img.style.display = 'block';
            const init = container.querySelector('.rank-cover-init');
            if (init) init.style.display = 'none';
          }
        });
        localStorage.setItem('my9_cover_cache', JSON.stringify(coverCache));
      }
    }

    // ===== RENDER =====
    function render() {
      document.getElementById('trendTitle').textContent = t('trend_title');
      document.getElementById('trendSubtitle').textContent = t('trend_subtitle');
      document.getElementById('backLink').textContent = t('back');
      document.getElementById('ctaMake').textContent = t('cta');

      renderLangSwitcher();
      renderKindTabs();

      const data = getRankData();
      const list = document.getElementById('rankList');

      if (!data.length) {
        list.innerHTML = `<div class="empty-state">
          <div class="emoji">📊</div>
          <p>${t('empty_title')}</p>
          <p>${t('empty_desc')}</p>
        </div>`;
        return;
      }

      const maxCount = data[0].count;
      list.innerHTML = data.map((item, i) => {
        const pct = Math.round((item.count / maxCount) * 100);
        const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : (i + 1);
        const numClass = i < 3 ? ` top-${i+1}` : '';
        const bgColor = colorFor(item.title);
        const initial = item.title.charAt(0);
        const hasCover = !!item.cover;
        const coverSrc = hasCover && !item.cover.startsWith('https://wsrv')
          ? proxyUrl(item.cover) : item.cover;
        const coverHtml = hasCover
          ? `<img src="${coverSrc}" alt="" loading="lazy" style="display:block" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
            + `<div class="rank-cover-init" style="display:none;background:${bgColor}">${escapeHtml(initial)}</div>`
          : `<div class="rank-cover-init" style="background:${bgColor}">${escapeHtml(initial)}</div>`;

        return `<div class="rank-item" data-bgm-id="${item.id || ''}">
          <div class="rank-num${numClass}">${medal}</div>
          <div class="rank-cover">${coverHtml}</div>
          <div class="rank-info">
            <div class="rank-title">${escapeHtml(item.title)}</div>
            <div class="rank-bar-wrap"><div class="rank-bar" style="width:${pct}%"></div></div>
            <div class="rank-count">${t('picks', { n: item.count.toLocaleString() })}</div>
          </div>
        </div>`;
      }).join('');

      // Lazy-load covers from Bangumi API
      fetchCovers(data);
    }

    function escapeHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ===== BACKEND PROBE =====
    async function loadFromBackend() {
      if (!API_BASE) return;
      try {
        const resp = await fetch(`${API_BASE}/trending?kind=${currentKind}&lang=${currentLang}`, {
          signal: AbortSignal.timeout(3000)
        });
        if (!resp.ok) return;
        const data = await resp.json();
        if (data.items && data.items.length) {
          backendAvailable = true;
          backendTrending[data.kind || currentKind] = data.items;
          render(); // re-render with real data
        }
      } catch(e) { /* fallback to seed data */ }
    }

    // ===== INIT =====
    render();
    loadFromBackend();
  </script>
</body>
</html>
