#   user_id VARCHAR(64),              -- optional PixAI user ID
#   lang VARCHAR(8),                  -- ja/ko/en/zh-TW
#   ip_hash VARCHAR(64),              -- hashed IP for rate limiting
#   created_at TIMESTAMPTZ DEFAULT NOW()
# );
#
