#   bgm_id INTEGER PRIMARY KEY,
#   title TEXT NOT NULL,
#   title_cn TEXT,
#   cover_url TEXT,
#   fetched_at TIMESTAMPTZ DEFAULT NOW()
# );
#
# -- Materialized view for trending (refresh every 5 min)
# CREATE MATERIALIZED VIEW my9_trending AS
# SELECT
#   kind,
#   unnest(ids) AS bgm_id,
#   COUNT(*) AS pick_count
# FROM my9_picks
# GROUP BY kind, bgm_id
# ORDER BY kind, pick_count DESC;
#
# Redis keys:
# - my9:count        → total generation count (INCR on each POST /picks)
# - my9:count:today  → daily count (INCR + EXPIRE midnight)
# - my9:trending:{kind} → cached JSON, 5 min TTL
